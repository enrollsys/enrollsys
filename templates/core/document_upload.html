{% extends 'core/base.html' %}
{% block content %}
<section class="section">
    <div class="container">
        {% include 'core/partials/dashboard_nav.html' %}
        <div class="panel">
            <h1 class="page-title">Загрузка документа</h1>
            <p class="muted">Файл будет прикреплен к заявке #{{ application.pk }}.</p>
            <form method="post" enctype="multipart/form-data">
                {% include 'core/partials/form.html' %}
                <p class="muted" data-file-preview>Файл не выбран</p>
                <div class="actions section compact"><button type="submit">Загрузить</button><a class="btn ghost" href="{% url 'application_detail' application.pk %}">Назад</a></div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
