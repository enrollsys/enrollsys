{% extends 'core/base.html' %}
{% block content %}
<section class="section">
    <div class="container">
        <div class="section-header"><h1 class="page-title">Новости</h1></div>
        <div class="card-grid">
            {% for item in news %}
                <article class="card">
                    <p class="muted">{{ item.created_at|date:"d.m.Y" }}</p>
                    <h3>{{ item.title }}</h3>
                    <p>{{ item.content|truncatewords:28 }}</p>
                    <a class="btn secondary" href="{% url 'news_detail' item.slug %}">Читать</a>
                </article>
            {% empty %}
                {% include 'core/partials/empty.html' %}
            {% endfor %}
        </div>
    </div>
</section>
{% endblock %}
