{% extends 'core/base.html' %}
{% block content %}
<div class="container">
    <div class="dashboard-layout">
        {% include 'core/partials/dashboard_nav.html' %}
        <div class="dashboard-content">
            <div style="margin-bottom:28px;"><div class="section-label">Настройки</div><h1 class="page-title">Профиль</h1></div>
            <div class="panel" style="max-width:600px;">
                <div class="panel-title">👤 Личные данные</div>
                <form method="post">
                    {% include 'core/partials/form.html' %}
                    <div style="margin-top:24px; display:flex; gap:12px; flex-wrap:wrap;">
                        <button type="submit">💾 Сохранить</button>
                        <a class="btn btn-secondary" href="{% if current_role == 'admin' %}{% url 'admin_dashboard' %}{% elif current_role == 'methodist' %}{% url 'methodist_dashboard' %}{% else %}{% url 'applicant_dashboard' %}{% endif %}">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
