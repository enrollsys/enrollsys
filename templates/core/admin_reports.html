{% extends 'core/base.html' %}
{% block content %}
<section class="section"><div class="container">
    {% include 'core/partials/dashboard_nav.html' %}
    <div class="section-header"><h1 class="page-title">Отчеты и выгрузки</h1><a class="btn" href="{% url 'export_applications_xlsx' %}">Сформировать XLSX</a></div>
    <div class="table-card"><table><thead><tr><th>Файл</th><th>Размер</th><th></th></tr></thead><tbody>
    {% for file in files %}
        <tr><td>{{ file.name }}</td><td>{{ file.size }} байт</td><td><a class="btn secondary" href="{% url 'download_generated' file.name %}">Скачать</a></td></tr>
    {% empty %}
        <tr><td colspan="3">Сформированных файлов пока нет.</td></tr>
    {% endfor %}
    </tbody></table></div>
</div></section>
{% endblock %}
