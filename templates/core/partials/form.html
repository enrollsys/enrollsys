{% csrf_token %}
{% if form.non_field_errors %}
    <div class="alert error">{{ form.non_field_errors }}</div>
{% endif %}
<div class="form-grid">
    {% for field in form %}
        <label class="field{% if field.field.widget.input_type == 'checkbox' %} check-field{% endif %}">
            <span>{{ field.label }}</span>
            {{ field }}
            {% if field.help_text %}<small>{{ field.help_text }}</small>{% endif %}
            {% for error in field.errors %}<small class="field-error">{{ error }}</small>{% endfor %}
        </label>
    {% endfor %}
</div>
